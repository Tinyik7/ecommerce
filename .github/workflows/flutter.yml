name: Flutter CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "lib/**"
      - "test/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/flutter.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "lib/**"
      - "test/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/flutter.yml"

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Static analysis
        run: flutter analyze
      - name: Unit tests
        run: |
          if [ -d test ] && find test -name '*_test.dart' -print -quit | grep -q .; then
            flutter test
          else
            echo "No Flutter tests found, skipping."
          fi
      - name: Integration tests
        run: |
          if [ -d integration_test ] && find integration_test -name '*_test.dart' -print -quit | grep -q .; then
            DEVICE_ID="$(flutter devices | awk -F'•' '/•/{gsub(/ /,"",$2); if($2!=""){print $2; exit}}')"
            if [ -n "$DEVICE_ID" ]; then
              flutter test integration_test -d "$DEVICE_ID"
            else
              echo "No device available for integration_test, skipping."
            fi
          else
            echo "No integration tests found, skipping."
          fi
